  <rect x="68" y="68" width="1064" height="539" fill="#eaf8f3" fill-opacity="0.42"/>
  <text x="92" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" letter-spacing="4" fill="#0f5e4b">DIAGRAM PENJELAS DIAGRAM</text>
  <text x="92" y="174" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#0a0a0a"><tspan x="92" dy="0">Diagram penjelas: badak Jawa di Ujung Kulon</tspan></text>
  <text x="92" y="232" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="400" fill="#4f5b57"><tspan x="92" dy="0">Diagram penjelas NaLI, bukan foto lapangan, yang merangkum alur utama badak Jawa di</tspan><tspan x="92" dy="24">Ujung Kulon dari rujukan terbuka yang dicantumkan.</tspan></text>
  
      <g>
        <rect x="92" y="288" width="1016" height="64" fill="#ffffff" fill-opacity="0.66" stroke="#0f5e4b" stroke-opacity="0.45" stroke-dasharray="8 8"/>
        <circle cx="128" cy="318" r="16" fill="#eaf8f3" stroke="#0f5e4b" stroke-opacity="0.65"/>
        <text x="128" y="323" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#0f5e4b">01</text>
        <text x="164" y="310" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="400" fill="#1c1c1c"><tspan x="164" dy="0">Badak Jawa berstatus Critically Endangered.</tspan></text>
      </g>
      <g>
        <rect x="92" y="364" width="1016" height="64" fill="#ffffff" fill-opacity="0.66" stroke="#0f5e4b" stroke-opacity="0.45" stroke-dasharray="8 8"/>
        <circle cx="128" cy="394" r="16" fill="#eaf8f3" stroke="#0f5e4b" stroke-opacity="0.65"/>
        <text x="128" y="399" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#0f5e4b">02</text>
        <text x="164" y="386" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="400" fill="#1c1c1c"><tspan x="164" dy="0">Populasi liar dunia terkonsentrasi di Taman Nasional Ujung Kulon.</tspan></text>
      </g>
      <g>
        <rect x="92" y="440" width="1016" height="64" fill="#ffffff" fill-opacity="0.66" stroke="#0f5e4b" stroke-opacity="0.45" stroke-dasharray="8 8"/>
        <circle cx="128" cy="470" r="16" fill="#eaf8f3" stroke="#0f5e4b" stroke-opacity="0.65"/>
        <text x="128" y="475" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#0f5e4b">03</text>
        <text x="164" y="462" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="400" fill="#1c1c1c"><tspan x="164" dy="0">Tidak ada populasi penangkaran yang dapat menjadi cadangan cepat.</tspan></text>
      </g>
      <g>
        <rect x="92" y="516" width="1016" height="64" fill="#ffffff" fill-opacity="0.66" stroke="#0f5e4b" stroke-opacity="0.45" stroke-dasharray="8 8"/>
        <circle cx="128" cy="546" r="16" fill="#eaf8f3" stroke="#0f5e4b" stroke-opacity="0.65"/>
        <text x="128" y="551" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#0f5e4b">04</text>
        <text x="164" y="538" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="400" fill="#1c1c1c"><tspan x="164" dy="0">Konsentrasi di satu lokasi meningkatkan risiko dari penyakit, bencana, dan perubahan</tspan><tspan x="164" dy="24">habitat.</tspan></text>
      </g>
