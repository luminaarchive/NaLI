<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Diagram penjelas: penemuan Homo floresiensis di Liang Bua, Flores">
  <rect width="1200" height="675" fill="#f7fbf8"/>
  <rect x="36" y="36" width="1128" height="603" fill="#ffffff" stroke="#0f5e4b" stroke-opacity="0.62" stroke-dasharray="12 10"/>
  <rect x="68" y="68" width="1064" height="539" fill="#eaf8f3" fill-opacity="0.42"/>
  <text x="92" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" letter-spacing="4" fill="#0f5e4b">DIAGRAM PENJELAS</text>
  <text x="92" y="166" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#0a0a0a"><tspan x="92" dy="0">Homo floresiensis: jejak manusia kerdil</tspan><tspan x="92" dy="40">di Gua Liang Bua, Flores</tspan></text>

  <!-- timeline spine -->
  <line x1="120" y1="330" x2="1080" y2="330" stroke="#0f5e4b" stroke-width="2" stroke-opacity="0.5"/>

  <!-- step 1 -->
  <circle cx="170" cy="330" r="9" fill="#0f5e4b"/>
  <text x="120" y="300" font-family="ui-monospace, monospace" font-size="15" font-weight="700" fill="#0f5e4b">2003</text>
  <text x="120" y="372" font-family="ui-monospace, monospace" font-size="14" fill="#1c1c1c"><tspan x="120" dy="0">Kerangka LB1</tspan><tspan x="120" dy="20">digali di Liang Bua</tspan></text>

  <!-- step 2 -->
  <circle cx="400" cy="330" r="9" fill="#0f5e4b"/>
  <text x="350" y="300" font-family="ui-monospace, monospace" font-size="15" font-weight="700" fill="#0f5e4b">2004</text>
  <text x="350" y="372" font-family="ui-monospace, monospace" font-size="14" fill="#1c1c1c"><tspan x="350" dy="0">Dideskripsikan</tspan><tspan x="350" dy="20">sebagai spesies baru</tspan></text>

  <!-- step 3 -->
  <circle cx="630" cy="330" r="9" fill="#b6772a"/>
  <text x="580" y="300" font-family="ui-monospace, monospace" font-size="15" font-weight="700" fill="#b6772a">2004 - 2014</text>
  <text x="580" y="372" font-family="ui-monospace, monospace" font-size="14" fill="#1c1c1c"><tspan x="580" dy="0">Debat: spesies</tspan><tspan x="580" dy="20">tersendiri atau patologi</tspan></text>

  <!-- step 4 -->
  <circle cx="860" cy="330" r="9" fill="#0f5e4b"/>
  <text x="810" y="300" font-family="ui-monospace, monospace" font-size="15" font-weight="700" fill="#0f5e4b">2016</text>
  <text x="810" y="372" font-family="ui-monospace, monospace" font-size="14" fill="#1c1c1c"><tspan x="810" dy="0">Penanggalan ulang:</tspan><tspan x="810" dy="20">sekitar 60 ribu tahun</tspan></text>

  <!-- step 5 -->
  <circle cx="1040" cy="330" r="9" fill="#0f5e4b"/>
  <text x="1000" y="300" font-family="ui-monospace, monospace" font-size="15" font-weight="700" fill="#0f5e4b">KINI</text>
  <text x="980" y="372" font-family="ui-monospace, monospace" font-size="14" fill="#1c1c1c"><tspan x="980" dy="0">Diterima luas</tspan><tspan x="980" dy="20">sebagai spesies</tspan></text>

  <!-- key facts band -->
  <text x="92" y="470" font-family="ui-monospace, monospace" font-size="15" font-weight="700" letter-spacing="2" fill="#0f5e4b">CIRI YANG DICATAT</text>
  <text x="92" y="502" font-family="ui-monospace, monospace" font-size="14" fill="#1c1c1c">Tinggi sekitar satu meter, volume otak sekitar 400 cc, hidup bersama Stegodon kerdil dan komodo.</text>
  <text x="92" y="528" font-family="ui-monospace, monospace" font-size="14" fill="#1c1c1c">Alat batu ditemukan di lapisan yang sama. Belum ada DNA yang berhasil diambil dari tulangnya.</text>

  <text x="92" y="586" font-family="ui-monospace, monospace" font-size="12.5" fill="#0f5e4b" fill-opacity="0.85">Diagram penjelas NaLI, bukan foto lapangan. Disusun dari rujukan yang dicantumkan di artikel.</text>
</svg>
