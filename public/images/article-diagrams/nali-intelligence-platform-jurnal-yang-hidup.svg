<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" role="img" aria-label="Diagram alur Intelligence Lab NaLI: panen data, skor, dasbor privat, gerbang manusia, lalu satu misi publik berupa pertanyaan">
  <defs>
    <style>
      .paper { fill: #ffffff; }
      .ink { fill: #0E3A5C; }
      .deep { fill: #082338; }
      .wash { fill: #E9F2F8; }
      .accent { fill: #C2410C; }
      .stroke-ink { fill: none; stroke: #0E3A5C; stroke-width: 1.6; }
      .stroke-dash { fill: none; stroke: #0E3A5C; stroke-width: 1.4; stroke-dasharray: 5 4; }
      .stroke-accent { fill: none; stroke: #C2410C; stroke-width: 1.8; }
      .t-title { font-family: Georgia, 'Times New Roman', serif; font-weight: 700; }
      .t-mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
      text { fill: #0E3A5C; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#0E3A5C" />
    </marker>
    <marker id="arrowA" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#C2410C" />
    </marker>
  </defs>

  <rect class="paper" x="0" y="0" width="820" height="560" />

  <text class="t-title" x="410" y="34" text-anchor="middle" font-size="20">Alur Intelligence Lab NaLI</text>
  <text class="t-mono" x="410" y="54" text-anchor="middle" font-size="11">Privat sampai gerbang manusia. Yang menyeberang ke publik hanya pertanyaan.</text>

  <!-- PRIVATE ZONE -->
  <rect class="stroke-dash" x="24" y="76" width="772" height="300" rx="6" />
  <text class="t-mono" x="40" y="98" font-size="11" letter-spacing="1.5">RUANG INTERNAL / BELUM TERVERIFIKASI</text>

  <!-- 1. HARVEST -->
  <rect class="wash" x="48" y="120" width="180" height="96" rx="4" />
  <rect class="stroke-ink" x="48" y="120" width="180" height="96" rx="4" />
  <text class="t-mono" x="60" y="142" font-size="10" letter-spacing="1">1 · PANEN DATA</text>
  <text class="t-title" x="60" y="166" font-size="14">Sumber terbuka</text>
  <text class="t-mono" x="60" y="186" font-size="10">GBIF · iNaturalist</text>
  <text class="t-mono" x="60" y="201" font-size="10">IUCN · Xeno-canto</text>

  <!-- 2. SCORE -->
  <rect class="wash" x="320" y="120" width="180" height="96" rx="4" />
  <rect class="stroke-ink" x="320" y="120" width="180" height="96" rx="4" />
  <text class="t-mono" x="332" y="142" font-size="10" letter-spacing="1">2 · SKOR TRANSPARAN</text>
  <text class="t-title" x="332" y="166" font-size="14">Skor Lazarus</text>
  <text class="t-mono" x="332" y="186" font-size="10">heuristik prioritas,</text>
  <text class="t-mono" x="332" y="201" font-size="10">bukan probabilitas</text>

  <!-- 3. DASHBOARD -->
  <rect class="wash" x="592" y="120" width="180" height="96" rx="4" />
  <rect class="stroke-ink" x="592" y="120" width="180" height="96" rx="4" />
  <text class="t-mono" x="604" y="142" font-size="10" letter-spacing="1">3 · DASBOR PRIVAT</text>
  <text class="t-title" x="604" y="166" font-size="14">/lab · /lab/signals</text>
  <text class="t-mono" x="604" y="186" font-size="10">khusus admin,</text>
  <text class="t-mono" x="604" y="201" font-size="10">tidak terindeks</text>

  <!-- arrows row 1 -->
  <line class="stroke-ink" x1="228" y1="168" x2="318" y2="168" marker-end="url(#arrow)" />
  <line class="stroke-ink" x1="500" y1="168" x2="590" y2="168" marker-end="url(#arrow)" />

  <!-- 4. HUMAN GATE -->
  <rect class="stroke-accent" x="592" y="268" width="180" height="84" rx="4" />
  <text class="t-mono accent" x="604" y="290" font-size="10" letter-spacing="1">4 · GERBANG MANUSIA</text>
  <text class="t-title accent" x="604" y="314" font-size="14">Editor menilai</text>
  <text class="t-mono" x="604" y="334" font-size="10">promosi 1-klik,</text>
  <text class="t-mono" x="604" y="349" font-size="10">keputusan manusia</text>

  <!-- arrow dashboard -> gate -->
  <line class="stroke-accent" x1="682" y1="216" x2="682" y2="266" marker-end="url(#arrowA)" />

  <!-- boundary arrow gate -> public -->
  <line class="stroke-accent" x1="592" y1="310" x2="470" y2="310" marker-end="url(#arrowA)" />
  <text class="t-mono accent" x="470" y="300" text-anchor="end" font-size="9.5">satu arah</text>

  <!-- PUBLIC ZONE -->
  <rect class="stroke-ink" x="24" y="404" width="772" height="132" rx="6" />
  <text class="t-mono" x="40" y="426" font-size="11" letter-spacing="1.5">SITUS PUBLIK</text>

  <!-- 5. MISSION -->
  <rect class="ink" x="48" y="444" width="220" height="76" rx="4" />
  <text class="t-mono" x="60" y="466" font-size="10" letter-spacing="1" fill="#ffffff">5 · MISI PUBLIK</text>
  <text class="t-title" x="60" y="490" font-size="14" fill="#ffffff">Sebuah PERTANYAAN</text>
  <text class="t-mono" x="60" y="509" font-size="9.5" fill="#cfe0ec">"adakah bukti terkini?" bukan klaim</text>

  <!-- 6. CITIZEN -->
  <rect class="paper" x="320" y="444" width="200" height="76" rx="4" />
  <rect class="stroke-ink" x="320" y="444" width="200" height="76" rx="4" />
  <text class="t-mono" x="332" y="466" font-size="10" letter-spacing="1">6 · /misi</text>
  <text class="t-title" x="332" y="490" font-size="14">Laporan warga</text>
  <text class="t-mono" x="332" y="509" font-size="9.5">privat sampai ditinjau editor</text>

  <!-- 7. ARTICLE -->
  <rect class="paper" x="572" y="444" width="200" height="76" rx="4" />
  <rect class="stroke-ink" x="572" y="444" width="200" height="76" rx="4" />
  <text class="t-mono" x="584" y="466" font-size="10" letter-spacing="1">7 · ARTIKEL</text>
  <text class="t-title" x="584" y="490" font-size="14">Bukti cukup?</text>
  <text class="t-mono" x="584" y="509" font-size="9.5">baru jadi tulisan bersumber</text>

  <!-- arrows public row -->
  <line class="stroke-ink" x1="268" y1="482" x2="318" y2="482" marker-end="url(#arrow)" />
  <line class="stroke-ink" x1="520" y1="482" x2="570" y2="482" marker-end="url(#arrow)" />

  <!-- gate down to mission -->
  <path class="stroke-accent" d="M410,310 L410,360 Q410,372 398,372 L158,372 L158,442" marker-end="url(#arrowA)" />
</svg>
