<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="Georgia, 'Times New Roman', serif">
  <rect width="760" height="480" fill="#f6f4ee"/>

  <!-- title -->
  <text x="32" y="42" font-size="22" fill="#15324a" font-weight="bold">Mekanisme Pendinginan Global (Tahun Tanpa Musim Panas 1816)</text>
  <text x="32" y="64" font-size="13" fill="#5b6b73">Diagram alur skematis aerosol letusan Gunung Tambora 1815. Sumber: Smithsonian GVP &amp; Oppenheimer (2003).</text>
  <line x1="32" y1="76" x2="728" y2="76" stroke="#15324a" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Stratosphere Layer -->
  <rect x="32" y="92" width="696" height="100" fill="#1e293b" opacity="0.9"/>
  <text x="48" y="115" font-size="13" fill="#94a3b8" font-weight="bold">LAPISAN STRATOSFER (~10-50 km)</text>
  <text x="48" y="132" font-size="11" fill="#64748b">Aerosol sulfat bertahan 1-3 tahun di lapisan ini karena minimnya awan hujan.</text>

  <!-- Troposphere Layer -->
  <rect x="32" y="196" width="696" height="160" fill="#e2e8f0" opacity="0.6"/>
  <text x="48" y="215" font-size="13" fill="#475569" font-weight="bold">LAPISAN TROPOSFER (0-10 km)</text>
  
  <!-- Earth Surface / Land -->
  <rect x="32" y="360" width="696" height="70" fill="#d8d2c2"/>
  <line x1="32" y1="360" x2="728" y2="360" stroke="#15324a" stroke-width="1.5"/>
  <text x="48" y="385" font-size="13" fill="#15324a" font-weight="bold">PERMUKAAN BUMI (Suasana Musim Panas 1816)</text>
  <text x="48" y="405" font-size="11" fill="#5b6b73">Suhu global rata-rata turun 0.5 - 1.0°C. Embun beku mematikan tanaman pangan.</text>

  <!-- Volcano Tambora -->
  <path d="M80 360 L140 280 L200 360 Z" fill="#b91c1c" stroke="#15324a" stroke-width="1.5"/>
  <path d="M125 280 L140 270 L155 280 Z" fill="#f8fafc"/>
  <text x="100" y="345" font-size="12" fill="#ffffff" font-weight="bold">Tambora</text>
  <text x="100" y="357" font-size="10" fill="#f87171">April 1815</text>

  <!-- Eruption Column -->
  <path d="M140 270 C130 230, 110 200, 150 130 C190 120, 250 130, 300 130" fill="none" stroke="#78716c" stroke-width="8" stroke-dasharray="2 2" stroke-linecap="round"/>
  <text x="165" y="230" font-size="11" fill="#c2410c" font-weight="bold">Erupsi Kolosal (VEI 7)</text>
  <text x="165" y="245" font-size="10" fill="#57534e">SO₂ gas raksasa dilepas ke stratosfer</text>

  <!-- Aerosol Veil / Shield in Stratosphere -->
  <g>
    <rect x="280" y="110" width="410" height="40" rx="10" fill="#fef08a" stroke="#cabf45" stroke-width="1.5" opacity="0.8"/>
    <text x="295" y="134" font-size="12" fill="#854d0e" font-weight="bold">Kabut Aerosol Sulfat (H₂SO₄)</text>
    <text x="485" y="134" font-size="11" fill="#854d0e">Memantulkan radiasi matahari kembali ke angkasa</text>
  </g>

  <!-- Solar Rays and Reflection -->
  <circle cx="500" cy="50" r="25" fill="#f59e0b"/>
  <path d="M500 20 L500 10 M500 80 L500 90 M470 50 L460 50 M530 50 L540 50" stroke="#f59e0b" stroke-width="2"/>
  <text x="535" y="48" font-size="11" fill="#d97706">Radiasi Matahari</text>

  <!-- Rays incoming -->
  <line x1="500" y1="75" x2="520" y2="120" stroke="#f59e0b" stroke-width="2" marker-end="url(#solar-arrow)"/>
  <!-- Ray reflected -->
  <line x1="520" y1="120" x2="600" y2="50" stroke="#ef4444" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#reflect-arrow)"/>
  <text x="580" y="85" font-size="11" fill="#ef4444" font-weight="bold">Refleksi Albedo ↑</text>

  <!-- Reduced energy reaching surface -->
  <line x1="520" y1="150" x2="530" y2="280" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#blue-arrow)"/>
  <text x="440" y="280" font-size="11" fill="#0284c7">Radiasi tersaring &amp; melemah ↓</text>

  <!-- Impact zones in surface -->
  <g transform="translate(380, 362)" font-size="11" fill="#15324a">
    <rect width="320" height="60" fill="#f8fafc" stroke="#15324a" stroke-width="1" opacity="0.9"/>
    <text x="12" y="18" font-weight="bold" fill="#1e3a8a">Gagal Panen Masif &amp; Suhu Ekstrem 1816</text>
    <text x="12" y="34">- New England: Salju turun di bulan Juni &amp; Juli.</text>
    <text x="12" y="48">- Eropa Barat: Musim dingin &amp; hujan tanpa henti.</text>
  </g>

  <!-- markers -->
  <defs>
    <marker id="solar-arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#f59e0b"/>
    </marker>
    <marker id="reflect-arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#ef4444"/>
    </marker>
    <marker id="blue-arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#38bdf8"/>
    </marker>
  </defs>
</svg>
