<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Georgia, 'Times New Roman', serif">
  <rect width="800" height="480" fill="#0d1117"/>
  <text x="400" y="36" fill="#e6edf3" font-size="19" text-anchor="middle" font-weight="bold">Seberapa dalam kehidupan ditemukan</text>
  <text x="400" y="56" fill="#9fb0bd" font-size="12" text-anchor="middle">Skema kedalaman, bukan skala persis. Disusun dari sumber yang dicantumkan.</text>

  <!-- vertical depth axis -->
  <line x1="120" y1="80" x2="120" y2="440" stroke="#30363d" stroke-width="2"/>
  <!-- surface band -->
  <rect x="121" y="80" width="560" height="40" fill="#1f6feb" opacity="0.2"/>
  <text x="135" y="105" fill="#58a6ff" font-size="13">Permukaan: 0 km, dunia bertenaga matahari</text>

  <!-- depth ticks -->
  <circle cx="120" cy="230" r="5" fill="#79c0ff"/>
  <text x="135" y="226" fill="#e6edf3" font-size="13" font-weight="bold">sekitar 2,5 km di bawah dasar laut</text>
  <text x="135" y="245" fill="#9fb0bd" font-size="11.5">Mikroba aktif di sedimen batubara, lepas Shimokita (IODP)</text>

  <circle cx="120" cy="305" r="5" fill="#d2a8ff"/>
  <text x="135" y="301" fill="#e6edf3" font-size="13" font-weight="bold">sekitar 2,8 km di tambang Mponeng</text>
  <text x="135" y="320" fill="#9fb0bd" font-size="11.5">Ekosistem bertenaga radiolisis batuan uranium</text>

  <circle cx="120" cy="395" r="5" fill="#f0883e"/>
  <text x="135" y="391" fill="#e6edf3" font-size="13" font-weight="bold">sampai sekitar 5 km dan lebih</text>
  <text x="135" y="410" fill="#9fb0bd" font-size="11.5">Batas kehidupan dalam terus terdorong makin dalam</text>

  <!-- gradient deep zone hint -->
  <rect x="121" y="120" width="560" height="320" fill="#161b22" opacity="0.0"/>
  <text x="400" y="465" fill="#9fb0bd" font-size="11.5" text-anchor="middle">Tenaga di kedalaman: kemolitotrof dan radiolisis, bukan fotosintesis</text>
</svg>
