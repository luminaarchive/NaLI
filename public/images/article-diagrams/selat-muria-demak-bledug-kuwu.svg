<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="Georgia, 'Times New Roman', serif">
  <rect width="760" height="480" fill="#f6f4ee"/>

  <!-- title -->
  <text x="32" y="42" font-size="22" fill="#15324a" font-weight="bold">Selat Muria: laut yang menjadi daratan</text>
  <text x="32" y="64" font-size="13" fill="#5b6b73">Peta penjelas skematis, bukan peta survei. Disusun dari sumber yang dicantumkan.</text>
  <line x1="32" y1="76" x2="728" y2="76" stroke="#15324a" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- sea (Java Sea) -->
  <rect x="32" y="92" width="696" height="300" fill="#cfe8e3"/>
  <text x="56" y="120" font-size="13" fill="#2a7d6c" font-style="italic">Laut Jawa</text>

  <!-- Muria as former island -->
  <path d="M150 150 q70 -40 150 0 q40 50 0 100 q-80 35 -150 0 q-35 -55 0 -100 z" fill="#d8d2c2" stroke="#15324a" stroke-width="1.5"/>
  <circle cx="225" cy="198" r="9" fill="#8a5a2b"/>
  <text x="195" y="150" font-size="13" fill="#15324a" font-weight="bold">Pulau Muria</text>
  <text x="200" y="225" font-size="11" fill="#5b6b73">G. Muria</text>

  <!-- Java mainland (south) -->
  <path d="M32 392 L728 392 L728 300 q-180 -30 -360 6 q-150 30 -336 -6 z" fill="#efe7d4" stroke="#15324a" stroke-width="1.5"/>
  <text x="560" y="365" font-size="13" fill="#15324a" font-weight="bold">Pulau Jawa</text>

  <!-- the palaeostrait label between Muria and Java -->
  <text x="300" y="300" font-size="14" fill="#1c5a7a" font-weight="bold" font-style="italic">Selat Muria</text>
  <path d="M300 305 q40 14 90 2" fill="none" stroke="#1c5a7a" stroke-width="1.2" stroke-dasharray="3 3"/>

  <!-- ports -->
  <g font-size="11" fill="#15324a">
    <circle cx="150" cy="300" r="4" fill="#15324a"/><text x="100" y="298">Jepara</text>
    <circle cx="248" cy="330" r="4" fill="#15324a"/><text x="255" y="328">Demak</text>
    <circle cx="360" cy="312" r="4" fill="#15324a"/><text x="368" y="310">Kudus</text>
    <circle cx="470" cy="320" r="4" fill="#15324a"/><text x="478" y="318">Pati</text>
    <circle cx="560" cy="330" r="4" fill="#15324a"/><text x="568" y="328">Juwana</text>
  </g>

  <!-- rivers depositing sediment (arrows from south into strait) -->
  <g stroke="#c2410c" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <path d="M250 388 C250 360 248 348 248 338"/>
    <path d="M380 386 C380 350 366 330 362 320"/>
    <path d="M500 388 C500 360 476 332 472 326"/>
  </g>
  <text x="392" y="372" font-size="11" fill="#c2410c" font-weight="bold">sedimen sungai (Wulan, Serang, Lusi, Juwana)</text>

  <!-- Bledug Kuwu in Grobogan, south -->
  <circle cx="430" cy="430" r="7" fill="#8a5a2b" stroke="#15324a" stroke-width="1"/>
  <text x="444" y="427" font-size="12" fill="#15324a" font-weight="bold">Bledug Kuwu (Grobogan)</text>
  <text x="444" y="443" font-size="10.5" fill="#5b6b73">semburan lumpur asin: jejak laut purba di bawah daratan</text>

  <!-- timeline strip -->
  <text x="32" y="465" font-size="10.5" fill="#5b6b73">Pengisian berlangsung sepanjang Holosen; sisa perairan dangkal menyempit hingga jadi daratan sekitar abad ke-18.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#c2410c"/>
    </marker>
  </defs>
</svg>
